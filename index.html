<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Car Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #13141a;
    --surface2: #1a1b24;
    --border: #2a2b3d;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --text: #e0e4f0;
    --muted: #555870;
    --online: #00e676;
    --warn: #ffab00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); }

  .version-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .card-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── CONNECTION ── */
  .connect-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-connect {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .btn-connect:hover {
    background: rgba(0,229,255,0.1);
    box-shadow: 0 0 16px rgba(0,229,255,0.2);
  }

  .btn-connect:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    box-shadow: none;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    flex: 1;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .dot.online {
    background: var(--online);
    box-shadow: 0 0 8px var(--online);
    animation: pulse 2s infinite;
  }

  .dot.error { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-text { color: var(--text); }

  .btn-disconnect {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .btn-disconnect:hover { background: rgba(255,61,113,0.1); }

  /* ── SPEED ── */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .speed-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
  }

  .speed-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
    line-height: 1;
  }

  .speed-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    border: 1px solid var(--border);
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,229,255,0.5);
    transition: box-shadow 0.2s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 18px rgba(0,229,255,0.8);
  }

  .speed-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }

  .speed-ticks span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  /* ── DPAD ── */
  .dpad-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    grid-template-rows: repeat(3, 72px);
    gap: 8px;
  }

  .dpad-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  .dpad-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.05); }

  .dpad-btn.pressed {
    background: rgba(0,229,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: inset 0 0 12px rgba(0,229,255,0.2), 0 0 12px rgba(0,229,255,0.15);
    transform: scale(0.95);
  }

  .halt-btn.pressed-unused {
    background: rgba(255,61,113,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: inset 0 0 12px rgba(255,61,113,0.2);
    transform: scale(0.95);
  }

  /* ── INFO PANEL ── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .info-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .info-cell-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 4px;
  }

  .info-cell-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .info-cell-val.accent { color: var(--accent); }
  .info-cell-val.warn { color: var(--warn); }

  /* ── LOG ── */
  #log {
    background: #090a0e;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 12px;
    height: 130px;
    overflow-y: auto;
    color: #6a6e88;
    line-height: 1.7;
  }

  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry { display: flex; gap: 10px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: #8a8eaa; }
  .log-msg.sent { color: var(--accent); }
  .log-msg.err { color: var(--accent2); }
  .log-msg.ok { color: var(--online); }

  /* ── KEYBOARD HINT ── */
  .kb-hint {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .kb-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .kb-key {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10px;
    color: var(--text);
  }

  /* ── DIVIDER ── */
  .divider {
    width: 1px;
    height: 180px;
    background: var(--border);
    align-self: center;
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .dpad { grid-template-columns: repeat(3, 64px); grid-template-rows: repeat(3, 64px); gap: 6px; }
    .divider { display: none; }
    .dpad-wrap { gap: 20px; }
    .info-grid { grid-template-columns: repeat(3, 1fr); }
    .connect-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ESP32<span>/</span>CAR &nbsp;·&nbsp; CTRL</div>
  <div class="version-badge">v2.1 · SPP</div>
</header>

<!-- CONNECTION -->
<div class="card">
  <div class="card-title">// serial link</div>
  <div class="connect-row">
    <button class="btn-connect" id="btn-connect">⚡ Connect</button>
    <div class="status-pill">
      <div class="dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Not connected</span>
    </div>
    <button class="btn-disconnect" id="btn-disconnect">Disconnect</button>
  </div>
</div>

<!-- SPEED -->
<div class="card">
  <div class="card-title">// thrust velocity</div>
  <div class="speed-row">
    <div class="speed-label">LVL</div>
    <div class="speed-display" id="speed-display">2</div>
    <div class="speed-bar-wrap">
      <input type="range" id="speed-slider" min="1" max="9" value="2" step="1">
      <div class="speed-ticks">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
        <span>6</span><span>7</span><span>8</span><span>9</span>
      </div>
    </div>
  </div>
</div>

<!-- DPAD + INFO -->
<div class="card">
  <div class="card-title">// navigation override</div>
  <div class="dpad-wrap">
    <div class="dpad">
      <div></div>
      <button class="dpad-btn" id="btn-F" data-cmd="F">▲</button>
      <div></div>
      <button class="dpad-btn" id="btn-L" data-cmd="L">◀</button>
      <div></div>
      <button class="dpad-btn" id="btn-R" data-cmd="R">▶</button>
      <div></div>
      <button class="dpad-btn" id="btn-B" data-cmd="B">▼</button>
      <div></div>
    </div>

    <div class="divider"></div>

    <div style="display:flex;flex-direction:column;gap:10px;min-width:160px;">
      <div class="info-grid" style="grid-template-columns:1fr 1fr;">
        <div class="info-cell">
          <div class="info-cell-label">CMD</div>
          <div class="info-cell-val accent" id="info-cmd">—</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">PWM</div>
          <div class="info-cell-val" id="info-pwm">—</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">SENT</div>
          <div class="info-cell-val" id="info-sent">0</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">BAUD</div>
          <div class="info-cell-val warn">115200</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="card">
  <div class="card-title">// data telemetry</div>
  <div id="log"><div class="log-entry"><span class="log-time">--:--:--</span><span class="log-msg">Waiting for system boot...</span></div></div>
</div>

<script>
  let port = null, writer = null;
  let sentCount = 0;

  const $ = id => document.getElementById(id);

  function now() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }

  function log(msg, type = '') {
    const el = $('log');
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg ${type}">${msg}</span>`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function mapPwm(level) {
    return 600 + level * 44;
  }

  function updateInfoCmd(cmd) {
    const labels = { F:'FWD', B:'BWD', L:'LEFT', R:'RIGHT', S:'HALT' };
    $('info-cmd').textContent = labels[cmd] || cmd;
    $('info-pwm').textContent = cmd === 'S' ? '0' : mapPwm(parseInt($('speed-slider').value));
  }

  // ── CONNECT ──
  $('btn-connect').addEventListener('click', async () => {
    try {
      port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      writer = port.writable.getWriter();

      $('status-dot').className = 'dot online';
      $('status-text').textContent = 'Connected';
      $('btn-connect').style.display = 'none';
      $('btn-disconnect').style.display = 'inline-block';
      log('Connection established. Handshake complete.', 'ok');
    } catch (err) {
      $('status-dot').className = 'dot error';
      $('status-text').textContent = 'Connection error';
      log('Error: ' + err.message, 'err');
    }
  });

  $('btn-disconnect').addEventListener('click', async () => {
    try {
      if (writer) { writer.releaseLock(); writer = null; }
      if (port) { await port.close(); port = null; }
    } catch (_) {}
    $('status-dot').className = 'dot';
    $('status-text').textContent = 'Not connected';
    $('btn-connect').style.display = 'inline-block';
    $('btn-disconnect').style.display = 'none';
    log('Disconnected.', 'err');
  });

  // ── SEND ──
  async function send(cmd) {
    if (!writer) { log('COM port not connected.', 'err'); return; }
    try {
      await writer.write(new TextEncoder().encode(cmd));
      sentCount++;
      $('info-sent').textContent = sentCount;
      updateInfoCmd(cmd);
      log('→ ' + cmd, 'sent');
    } catch (err) {
      log('Send failed: ' + err.message, 'err');
    }
  }

  // ── SPEED SLIDER ──
  $('speed-slider').addEventListener('input', function () {
    $('speed-display').textContent = this.value;
    send(this.value);
  });

  // ── DPAD BUTTONS ──
  document.querySelectorAll('.dpad-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;

    const press = () => { send(cmd); btn.classList.add('pressed'); };
    const release = () => {
      btn.classList.remove('pressed');
      send('S');
    };

    btn.addEventListener('mousedown', e => { e.preventDefault(); press(); });
    btn.addEventListener('mouseup', release);
    btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));

    btn.addEventListener('touchstart', e => { e.preventDefault(); press(); }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); release(); });
  });

  // ── KEYBOARD ──
  const keyMap = {
    'ArrowUp':    { cmd: 'F', id: 'btn-F' },
    'ArrowDown':  { cmd: 'B', id: 'btn-B' },
    'ArrowLeft':  { cmd: 'L', id: 'btn-L' },
    'ArrowRight': { cmd: 'R', id: 'btn-R' },
  };

  const activeKeys = new Set();

  window.addEventListener('keydown', e => {
    if (!keyMap[e.key] || activeKeys.has(e.key)) return;
    e.preventDefault();
    activeKeys.add(e.key);
    const { cmd, id } = keyMap[e.key];
    send(cmd);
    $(id).classList.add('pressed');
  });

  window.addEventListener('keyup', e => {
    if (!keyMap[e.key]) return;
    activeKeys.delete(e.key);
    const { id } = keyMap[e.key];
    $(id).classList.remove('pressed');
    send('S');
  });
</script>
</body>
</html>
